  <!-- Text lines on front rectangle -->
  <rect x="280" y="480" width="320" height="16" rx="8" fill="#A8925F" opacity="0.6"/>
  <rect x="280" y="536" width="260" height="16" rx="8" fill="#A8925F" opacity="0.6"/>
  <rect x="280" y="592" width="290" height="16" rx="8" fill="#A8925F" opacity="0.6"/>
</svg>