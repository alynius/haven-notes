<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <!-- Background: Light cream -->
  <rect width="1024" height="1024" rx="0" fill="#FEFDFB"/>

  <!-- Back rectangle (darkest) -->
  <rect x="340" y="200" width="480" height="600" rx="48" fill="#6B5234" opacity="0.85"/>

  <!-- Middle rectangle -->
  <rect x="270" y="260" width="480" height="600" rx="48" fill="#7D6140" opacity="0.9"/>

  <!-- Front rectangle (lightest) -->
