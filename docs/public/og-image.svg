  </defs>

  <rect width="1200" height="630" fill="#161512"/>
  <rect width="1200" height="630" fill="url(#glow)"/>

  <text x="600" y="170" font-family="ui-sans-serif, -apple-system, 'Helvetica Neue', Arial, sans-serif"
