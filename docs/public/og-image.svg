<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <radialGradient id="glow" cx="50%" cy="35%" r="55%">
      <stop offset="0%"  stop-color="#A0855E" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#161512" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rule" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0%"  stop-color="#A0855E" stop-opacity="0"/>
      <stop offset="50%" stop-color="#A0855E" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#A0855E" stop-opacity="0"/>
