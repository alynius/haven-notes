name: Haven
options:
  bundleIdPrefix: com.haven
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_BITCODE: NO

targets:
  Haven:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Haven
        excludes:
          - "**/*.md"
          - "**/*.sql"
    resources:
      - path: Haven/Assets.xcassets
      - path: Haven/PrivacyInfo.xcprivacy
    scheme:
      testTargets:
        - HavenTests
        - HavenUITests
      storeKitConfiguration: Haven/Configuration.storekit
    info:
      path: Haven/Info.plist
      properties:
        CFBundleDisplayName: Haven
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "3"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: Haven uses Face ID to secure your notes.
        NSSpeechRecognitionUsageDescription: Haven uses speech recognition for voice dictation in the note editor.
        NSMicrophoneUsageDescription: Haven uses the microphone to transcribe your voice into text.
        CFBundleURLTypes:
          - CFBundleURLName: com.havennotes.app
            CFBundleURLSchemes:
              - haven
    entitlements:
      path: Haven/Haven.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.havennotes.app
        SWIFT_VERSION: 5.9
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: Haven/Info.plist
        CODE_SIGN_ENTITLEMENTS: Haven/Haven.entitlements
    dependencies:
      - target: HavenWidgetExtension
        embed: true

  HavenMac:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: Haven
        excludes:
          - "**/*.md"
          - "**/*.sql"
          - "HavenWidget/**"
    resources:
      - path: Haven/Assets.xcassets
      - path: Haven/PrivacyInfo.xcprivacy
      - path: Haven/Configuration.storekit
    scheme:
      storeKitConfiguration: Haven/Configuration.storekit
    info:
      path: Haven/MacInfo.plist
      properties:
        CFBundleDisplayName: Haven
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "3"
        CFBundleURLTypes:
          - CFBundleURLName: com.havennotes.app
            CFBundleURLSchemes:
              - haven
        LSApplicationCategoryType: public.app-category.productivity
        NSMicrophoneUsageDescription: Haven uses the microphone to transcribe your voice into text.
        NSSpeechRecognitionUsageDescription: Haven uses speech recognition for voice dictation in the note editor.
    entitlements:
      path: Haven/HavenMac.entitlements
      properties:
        com.apple.security.app-sandbox: true
        com.apple.security.network.client: true
        com.apple.security.files.user-selected.read-only: true
        com.apple.security.device.audio-input: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.havennotes.app
        SWIFT_VERSION: 5.9
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        CODE_SIGN_ENTITLEMENTS: Haven/HavenMac.entitlements
        ENABLE_HARDENED_RUNTIME: YES

  HavenWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HavenWidget
        excludes:
          - "**/*.md"
    info:
      path: HavenWidget/Info.plist
      properties:
        CFBundleDisplayName: Haven Widget
        CFBundleShortVersionString: "1.1"
        CFBundleVersion: "3"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: HavenWidget/HavenWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.havennotes.app.widget
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: HavenWidget/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
        CODE_SIGN_ENTITLEMENTS: HavenWidget/HavenWidget.entitlements

  HavenTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HavenTests
    dependencies:
      - target: Haven
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.havennotes.app.tests
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES

  HavenUITests:
    type: bundle.ui-testing
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HavenUITests
    dependencies:
      - target: Haven
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.havennotes.app.uitests
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: YES
