name: Haven
options:
  bundleIdPrefix: com.haven
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_BITCODE: NO

targets:
  Haven:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Haven
        excludes:
          - "**/*.md"
          - "**/*.sql"
    resources:
      - path: Haven/Assets.xcassets
      - path: Haven/Services/Database/schema.sql
    info:
      path: Haven/Info.plist
      properties:
        CFBundleDisplayName: Haven
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: Haven uses Face ID to secure your notes.
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.haven.app
        SWIFT_VERSION: 5.9
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: Haven/Info.plist

  HavenTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HavenTests
    dependencies:
      - target: Haven
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.haven.app.tests
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: ""
