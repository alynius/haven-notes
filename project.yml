name: Haven
options:
  bundleIdPrefix: com.haven
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: 5.9
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    ENABLE_BITCODE: NO

targets:
  Haven:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: Haven
        excludes:
          - "**/*.md"
          - "**/*.sql"
    resources:
      - path: Haven/Assets.xcassets
      - path: Haven/PrivacyInfo.xcprivacy
    scheme:
      testPlans: []
      storeKitConfiguration: Haven/Configuration.storekit
    info:
      path: Haven/Info.plist
      properties:
        CFBundleDisplayName: Haven
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: true
        UILaunchScreen: {}
        UIApplicationSceneManifest:
          UIApplicationSupportsMultipleScenes: false
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        NSFaceIDUsageDescription: Haven uses Face ID to secure your notes.
        CFBundleURLTypes:
          - CFBundleURLName: com.havennotes.app
            CFBundleURLSchemes:
              - haven
    entitlements:
      path: Haven/Haven.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.havennotes.app
        SWIFT_VERSION: 5.9
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        INFOPLIST_FILE: Haven/Info.plist
        CODE_SIGN_ENTITLEMENTS: Haven/Haven.entitlements
    dependencies:
      - target: HavenWidgetExtension
        embed: true

  HavenWidgetExtension:
    type: app-extension
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HavenWidget
        excludes:
          - "**/*.md"
    info:
      path: HavenWidget/Info.plist
      properties:
        CFBundleDisplayName: Haven Widget
        CFBundleShortVersionString: "1.0"
        CFBundleVersion: "1"
        NSExtension:
          NSExtensionPointIdentifier: com.apple.widgetkit-extension
    entitlements:
      path: HavenWidget/HavenWidget.entitlements
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.havennotes.app.widget
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: HavenWidget/Info.plist
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/../../Frameworks"
        CODE_SIGN_ENTITLEMENTS: HavenWidget/HavenWidget.entitlements

  HavenTests:
    type: bundle.unit-test
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HavenTests
    dependencies:
      - target: Haven
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.havennotes.app.tests
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: ""
